<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ | Archive - Projects</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow-y: hidden;
        }

        * {
            cursor: none !important;
        }

        @media (min-width: 1024px) {
            #cursor {
                cursor: none !important;
                /* Tutup cursor asal Windows */
            }
        }

        /* CSS tambahan khusus untuk Works Page */
        .archive-container {
            padding: 120px 8vw;
            width: 100%;
        }

        .filter-nav {
            display: flex;
            gap: 15px;
            margin: 40px 0 60px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: auto !important;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .filter-btn.active {
            background: var(--accent);
            color: #000;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: block;
            transition: transform 0.2s ease;
        }

        /* Agar semua nampak */

        .project-card.hide {
            display: none;
        }

        .project-img-box {
            height: 300px;
            overflow: hidden;
            position: relative;
        }

        .project-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1);
            transition: 0.6s;
        }

        .project-card:hover img {
            filter: grayscale(0);
            transform: scale(1.05);
        }

        .project-info {
            padding: 30px;
        }

        .project-category {
            font-size: 9px;
            letter-spacing: 3px;
            opacity: 0.5;
            text-transform: uppercase;
        }

        .project-info h3 {
            margin: 10px 0;
            font-family: var(--font-serif);
            font-size: 1.5rem;
        }

        .project-card:active {
            transform: scale(0.98);
        }

        .back-home {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            text-decoration: none;
            color: var(--accent);
            font-size: 10px;
            letter-spacing: 2px;
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            cursor: pointer !important;
            user-select: none;
        }

        .back-home:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        @media (max-width: 768px) {
            .archive-grid {
                grid-template-columns: 1fr;
            }

            .archive-container {
                padding: 100px 6vw;
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }

        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            max-width: 1000px;
            margin: 50px auto;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            position: relative;
            padding: 40px;
            transform: scale(0.96) translateY(20px);
            opacity: 0;
            transition:
                transform 0.4s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            color: var(--accent);
            cursor: auto !important;
            z-index: 10;
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
        }

        .modal-img-container img {
            width: 100%;
            border-radius: 20px;
        }

        .tech-stack {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .tech-badge {
            font-size: 9px;
            padding: 5px 12px;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            opacity: 0.7;
        }

        @media (max-width: 850px) {
            .modal-body {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }
        }

        /* Mobile Scroll Reveal Effect (Works Page) */
        @media (max-width: 1023px) {

            .project-card {
                opacity: 0;
                transform: translateY(30px);
                transition:
                    opacity 0.6s ease,
                    transform 0.6s ease;
            }

            .project-card.active-mobile {
                opacity: 1;
                transform: translateY(0);
            }

            .project-card.active-mobile img {
                filter: grayscale(0);
                transform: scale(1.05);
            }
        }
    </style>
</head>

<body>

    <div id="cursor"></div>
    <div class="fixed-bg" id="bg"></div>
    <div class="noise"></div>
    <div class="scroll-progress" id="progress"></div>

    <a href="index.html" class="back-home">← BACK TO HOME</a>

    <div class="archive-container">
        <header class="section-header">
            <h1 class="big-title">ARCHIVE</h1>
            <p class="section-sub">FULL-STACK SOLUTIONS & CREATIVE WORKS</p>
        </header>

        <div class="filter-nav">
            <button class="filter-btn active" data-filter="all">All Projects</button>
            <button class="filter-btn" data-filter="web">Web Development</button>
            <button class="filter-btn" data-filter="app">App Development</button>
            
        </div>

        <div class="archive-grid" id="projectContainer">

        </div>
    </div>
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <div class="modal-img-container">
                    <img id="modalImg" src="" alt="Project Preview">
                </div>
                <div class="modal-text">
                    <span id="modalCategory" class="project-category"></span>
                    <h2 id="modalTitle" class="serif-title" style="margin-top: 10px; color: var(--accent);"></h2>
                    <p id="modalDescription" style="margin: 20px 0; line-height: 1.6; opacity: 0.8;"></p>
                    <div class="tech-stack" id="modalStack"></div>
                </div>

                <div style="text-align: center; margin-top: 20px;">
    <a id="modalLink" href="#" target="_blank" rel="noopener noreferrer" style="color: var(--accent); text-decoration: underline; font-weight: bold;">
        Visit Here
    </a>
</div>
            </div>
        </div>
    </div>

    <script>
        (async function () {

            /* -------------------------------------------------------------------------- */
            /*                               GLOBAL STATE                                  */
            /* -------------------------------------------------------------------------- */
            const container = document.getElementById('projectContainer');
            const modal = document.getElementById("projectModal");
            const closeModal = document.querySelector(".close-modal");
            const cursor = document.getElementById('cursor');
            let projects = [];

            if (!container) return;

            /* -------------------------------------------------------------------------- */
            /*                               FETCH PROJECTS                                 */
            /* -------------------------------------------------------------------------- */
            try {
                const response = await fetch('projects.json');
                projects = await response.json();
                renderProjects(projects);
            } catch (err) {
                console.error("Gagal tarik data projek:", err);
            }

            /* -------------------------------------------------------------------------- */
            /*                               RENDER PROJECTS                                */
            /* -------------------------------------------------------------------------- */
            function renderProjects(data) {
                container.innerHTML = data.map(project => `
            <div class="project-card" data-category="${project.category}">
                <div class="project-img-box">
                    <img src="${project.image}" alt="${project.title}">
                </div>
                <div class="project-info">
                    <span class="project-category">${project.categoryText}</span>
                    <h3>${project.title}</h3>
                    <p style="opacity:.7;font-size:14px;">${project.shortDesc}</p>
                </div>
            </div>
        `).join('');

                bindProjectClicks(data);
            }

            /* -------------------------------------------------------------------------- */
            /*                                   MODAL                                      */
            /* -------------------------------------------------------------------------- */
            function bindProjectClicks(data) {
                document.querySelectorAll('.project-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const title = card.querySelector('h3').innerText;
                        const project = data.find(p => p.title === title);
                        if (!project) return;

                        document.getElementById("modalTitle").innerText = project.title;
                        document.getElementById("modalImg").src = project.image;
                        document.getElementById("modalCategory").innerText = project.categoryText;
                        document.getElementById("modalDescription").innerText = project.fullDesc;
                        // Tambah ini dalam fungsi yang buka modal anda
document.getElementById('modalLink').href = project.link;
                        document.getElementById("modalStack").innerHTML =
                            project.stack.map(s => `<span class="tech-badge">${s}</span>`).join('');

                        modal.style.display = "flex";

                        // bagi browser render dulu sebelum tambah class
                        requestAnimationFrame(() => {
                            modal.classList.add('show');
                        });

                        document.body.style.overflow = "hidden";
                    });
                });
            }

            function closeProjectModal() {
                modal.classList.remove('show');

                // tunggu animation habis baru hide
                setTimeout(() => {
                    modal.style.display = "none";
                    document.body.style.overflow = "auto";
                }, 350);
            }

            if (closeModal) closeModal.onclick = closeProjectModal;
            window.addEventListener('click', e => { if (e.target === modal) closeProjectModal(); });
            document.addEventListener('keydown', e => { if (e.key === "Escape") closeProjectModal(); });

            /* -------------------------------------------------------------------------- */
            /*                                   FILTER                                     */
            /* -------------------------------------------------------------------------- */
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const filter = btn.dataset.filter;
                    const filtered = filter === 'all'
                        ? projects
                        : projects.filter(p => p.category === filter);

                    renderProjects(filtered);
                });
            });

            /* -------------------------------------------------------------------------- */
            /*                        MOBILE SCROLL REVEAL (WORKS)                         */
            /* -------------------------------------------------------------------------- */
            const isDesktop = window.innerWidth >= 1024;

            if (!isDesktop) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active-mobile');
                        } else {
                            entry.target.classList.remove('active-mobile');
                        }
                    });
                }, { threshold: 0.2 });

                // Observe project cards (re-bind setiap kali filter)
                const observeCards = () => {
                    document.querySelectorAll('.project-card').forEach(card => {
                        observer.observe(card);
                    });
                };

                observeCards();

                // Re-observe bila filter tukar content
                new MutationObserver(observeCards)
                    .observe(container, { childList: true });
            }

            /* -------------------------------------------------------------------------- */
            /*                                CUSTOM CURSOR                                 */
            /* -------------------------------------------------------------------------- */
            if (cursor) {
                document.addEventListener('mousemove', e => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });

                const interactive = () =>
                    document.querySelectorAll('a, button, .project-card, .close-modal');

                const applyCursorEvents = () => {
                    interactive().forEach(el => {
                        el.addEventListener('mouseenter', () => {
                            cursor.style.transform = 'scale(4)';
                            cursor.style.background = 'rgba(255,255,255,0.2)';
                        });
                        el.addEventListener('mouseleave', () => {
                            cursor.style.transform = 'scale(1)';
                            cursor.style.background = 'var(--accent)';
                        });
                    });
                };

                applyCursorEvents();
                new MutationObserver(applyCursorEvents)
                    .observe(container, { childList: true });
            }

        })();
    </script>

</body>

</html>
